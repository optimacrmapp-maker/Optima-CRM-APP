<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Optima CRM | Gestão Inteligente</title>
    <meta name="description" content="Sistema inteligente de gestão de clientes e tarefas para alta performance." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
      /* Prevenção de "pulo" de layout antes do carregamento do CSS */
      :root {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      
      body {
        margin: 0;
        padding: 0;
        /* Garante que o fundo combine com o seu tema enquanto o JS carrega */
        background-color: #f8fafc; 
      }

      /* Suporte nativo ao Dark Mode no nível do navegador */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0f172a;
        }
      }

      /* Estilo básico para o carregamento inicial (Skeleton/Loader) */
      #root:empty::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border: 3px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
